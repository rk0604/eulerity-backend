# --- Server ---
# Standard default port; portable across machines.
server.port=8080

# --- Claude / Anthropic API ---
# Leave blank by default; supply a real key via env or override at deploy time.
# Never commit a live key. A blank key makes /tasks/{id}/breakdown return 503.
anthropic.api.key=

# --- H2 in-memory database ---
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- H2 web console at http://localhost:8080/h2-console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
